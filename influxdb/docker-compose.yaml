# docker-compose.yaml
name: concentrador
services: 
  influxdb3-core: 
    container_name: influxdb3-core
    image: influxdb:3-core 
    ports: 
      - 8181:8181 
    command: 
      - influxdb3 
      - serve 
      - --node-id=node0 
      - --object-store=file 
      - --data-dir=/var/lib/influxdb3/data 
      - --admin-token-file=/run/secrets/admin-token
    secrets:
      - admin-token
    volumes: 
      - type: bind 
        source: ./data/influxdb/data 
        target: /var/lib/influxdb3/data 
    networks:
      - red_personalizada
  
  influxdb3-explorer:
    container_name: influxdb3-explorer
    image: influxdata/influxdb3-ui:1.9.0
    ports:
      - 8080:8080
    environment:
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
    command:
      - --mode=admin
    volumes:
      - ./config:/app-root/config
    networks:
      - red_personalizada

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "8883:8883"    # MQTTS (secure)
      - "9001:9001"    # WebSockets
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - red_personalizada

  node-red:
    image: nodered/node-red:5.0-debian
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    networks:
      - red_personalizada




secrets:
  admin-token:
    file: secrets/influxdb-key.json

networks:
  red_personalizada:
    driver: bridge